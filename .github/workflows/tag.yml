name: Tag dev version
on:
  workflow_dispatch:

jobs:
  tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Create dev tag
        run: |
          SHA=$(git rev-parse --short HEAD)
          VERSION=$(jq -r '.version' package.json)
          TAG="v${VERSION}-dev-${SHA}"
          git tag "$TAG"
          git push origin "$TAG"